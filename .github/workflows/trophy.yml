name: Generate trophy card

on:
  schedule: # execute every 12 hours
    - cron: "* */12 * * *"

  workflow_dispatch:

  push:
    branches:
    - main

jobs:
  generate:
    permissions:
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: generate trophy.svg
        uses: ryo-ma/github-profile-trophy@master
        with:
          username: ${{ github.repository_owner }}
          theme: darkhub
          rank: SECRET,SSS,SS,S,AAA,AA,A,B,C
          margin-w: 8
          margin-h: 8
          no-bg: true
          no-frame: true

      - name: move trophy to dist directory
        run: |
          mkdir -p dist
          if [ -f "github-profile-trophy.svg" ]; then
            mv github-profile-trophy.svg dist/trophy.svg
          fi

      - name: push trophy.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: trophy-output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}